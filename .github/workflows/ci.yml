name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN || '' }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM || '' }}

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @floq/api test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: https://api.floq.com
          NEXT_PUBLIC_APP_URL: https://floq.com

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    # Advisory only — the suite needs seeded data + secrets that aren't wired up
    # in CI yet, so a failure here must not block the meaningful gates above.
    continue-on-error: true
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: floq
          POSTGRES_PASSWORD: floq
          POSTGRES_DB: floq
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @floq/e2e exec playwright install chromium --with-deps

      - name: Start API server
        run: pnpm --filter @floq/api dev &
        env:
          DATABASE_URL: postgresql://floq:floq@localhost:5432/floq
          REDIS_URL: redis://localhost:6379
          APP_DOMAIN: localhost:3001
          APP_URL: http://localhost:3001
          WEB_URL: http://localhost:3000
          ENCRYPTION_KEY: ${{ secrets.E2E_ENCRYPTION_KEY }}
          BETTER_AUTH_SECRET: ${{ secrets.E2E_AUTH_SECRET }}
          BETTER_AUTH_URL: http://localhost:3001
          S3_ENDPOINT: http://localhost:9000
          S3_BUCKET: floq-media
          S3_ACCESS_KEY: minioadmin
          S3_SECRET_KEY: minioadmin
          S3_PUBLIC_URL: http://localhost:9000/floq-media

      - name: Start web server
        run: pnpm --filter @floq/web dev &
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Wait for servers
        run: |
          npx wait-on http://localhost:3001/health http://localhost:3000 --timeout 60000

      - name: Run E2E tests
        run: pnpm --filter @floq/e2e test
        env:
          BASE_URL: http://localhost:3000
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 7
