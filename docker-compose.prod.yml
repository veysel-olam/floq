services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: floq
      POSTGRES_USER: floq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, pg_isready -U floq -d floq]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: [CMD, redis-cli, -a, "${REDIS_PASSWORD}", ping]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data

  api:
    image: ghcr.io/${GITHUB_REPO}-api:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://floq:${POSTGRES_PASSWORD}@postgres:5432/floq
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      APP_DOMAIN: ${APP_DOMAIN}
      APP_URL: ${APP_URL}
      WEB_URL: ${WEB_URL}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${APP_URL}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: floq-media
      S3_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      S3_SECRET_KEY: ${MINIO_SECRET_KEY}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      SENTRY_DSN: ${SENTRY_DSN:-}
      REQUIRE_INVITE: ${REQUIRE_INVITE:-false}
      ADMIN_SECRET: ${ADMIN_SECRET:-}
    ports:
      - "3001:3001"

  web:
    image: ghcr.io/${GITHUB_REPO}-web:latest
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
  minio_data:
