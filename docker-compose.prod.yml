services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    depends_on:
      - web
      - api

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: floq
      POSTGRES_USER: floq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, pg_isready -U floq -d floq]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: [CMD, redis-cli, -a, "${REDIS_PASSWORD}", ping]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/${GITHUB_REPO}-api:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://floq:${POSTGRES_PASSWORD}@postgres:5432/floq
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      APP_DOMAIN: ${APP_DOMAIN}
      APP_URL: https://${APP_DOMAIN}
      WEB_URL: https://${APP_DOMAIN}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: https://api.${APP_DOMAIN}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION:-auto}
      S3_BUCKET: ${S3_BUCKET:-floq-media}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_MAILTO: ${VAPID_MAILTO:-}
      REQUIRE_INVITE: ${REQUIRE_INVITE:-false}
      ADMIN_SECRET: ${ADMIN_SECRET:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      KLIPY_API_KEY: ${KLIPY_API_KEY:-}

  web:
    image: ghcr.io/${GITHUB_REPO}-web:latest
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
